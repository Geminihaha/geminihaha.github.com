<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>OpenClaw 상태 대시보드</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: 'Pretendard', 'Segoe UI', system-ui, sans-serif;
      background: #0f1118;
      color: #e4e6eb;
    }
    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at top,#19232a,#0b0d12 65%);
    }
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2rem 1.5rem 3rem;
    }
    header {
      text-align: center;
      margin-bottom: 2rem;
    }
    header h1 {
      margin: 0;
      font-size: clamp(2rem,4vw,2.5rem);
      letter-spacing: -0.02em;
    }
    header p {
      margin: 0.25rem 0 0;
      color: #9ab3c3;
      font-size: 1rem;
    }
    section {
      background: rgba(17,23,35,0.65);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 1rem;
      margin-bottom: 1.5rem;
      padding: 1.25rem 1.5rem;
      box-shadow: 0 15px 35px rgba(3,8,17,0.5);
    }
    h2 {
      margin: 0 0 0.75rem;
      font-size: 1.25rem;
      color: #fff;
    }
    .status-grid {
      display: grid;
      gap: 0.75rem;
      grid-template-columns: repeat(auto-fit,minmax(220px,1fr));
    }
    .status-card {
      background: rgba(255,255,255,0.02);
      padding: 0.75rem 0.9rem;
      border-radius: 0.75rem;
      border: 1px solid rgba(255,255,255,0.06);
    }
    .status-card strong {
      display: block;
      font-size: 0.9rem;
      color: #9ab3c3;
      margin-bottom: 0.35rem;
    }
    .status-card span {
      font-size: 1rem;
      color: #f7fcff;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.95rem;
    }
    thead th {
      text-align: left;
      font-weight: 600;
      border-bottom: 1px solid rgba(255,255,255,0.15);
      padding-bottom: 0.5rem;
    }
    tbody tr:not(:last-child) td {
      border-bottom: 1px dashed rgba(255,255,255,0.08);
    }
    td {
      padding: 0.45rem 0;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.35rem;
      font-size: 0.8rem;
      padding: 0.2rem 0.7rem;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
    }
    .code-block {
      background: rgba(0,0,0,0.4);
      border-radius: 0.75rem;
      padding: 1rem;
      font-family: 'JetBrains Mono', 'SFMono-Regular', mono;
      font-size: 0.85rem;
      overflow-x: auto;
    }
    @media (max-width: 600px) {
      section {
        padding: 1rem;
      }
      table, thead, tbody, tr, td, th {
        display: block;
      }
      thead {
        display: none;
      }
      tbody tr {
        margin-bottom: 1rem;
      }
      td {
        padding: 0.3rem 0;
      }
      td::before {
        content: attr(data-label);
        float: left;
        font-weight: 600;
        color: #9ab3c3;
        margin-right: 0.5rem;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>OpenClaw 상태 대시보드</h1>
      <p>현재 게이트웨이 및 에이전트 정보를 한눈에 확인하세요.</p>
    </header>

    <section aria-label="Status summary">
      <h2>상태 요약</h2>
      <div id="status-grid" class="status-grid"></div>
    </section>

    <section aria-label="Security warnings">
      <h2>보안 경고</h2>
      <ul id="security-list"></ul>
    </section>

    <section aria-label="Channel detail">
      <h2>통신 채널</h2>
      <div class="code-block" id="channel-json"></div>
    </section>

    <section aria-label="Active sessions">
      <h2>최근 세션</h2>
      <table>
        <thead>
          <tr>
            <th>세션</th>
            <th>종류</th>
            <th>모델 / 캐시</th>
            <th>활성화</th>
          </tr>
        </thead>
        <tbody id="session-body"></tbody>
      </table>
    </section>

    <section aria-label="Agent list">
      <h2>에이전트 목록</h2>
      <table>
        <thead>
          <tr>
            <th>에이전트</th>
            <th>Identity</th>
            <th>Workspace</th>
            <th>기본 모델</th>
          </tr>
        </thead>
        <tbody id="agent-body"></tbody>
      </table>
    </section>
  </main>

  <script>
    const statusSummary = [
      { label: 'Dashboard', value: 'http://127.0.0.1:18789/' },
      { label: 'OS', value: 'linux 6.17.0-PRoot-Distro (arm64) · node 22.22.1' },
      { label: 'Tailscale', value: 'off' },
      { label: 'Channel', value: 'stable (default)' },
      { label: 'Update', value: 'pnpm · npm latest unknown' },
      { label: 'Gateway', value: 'local · ws://127.0.0.1:18789 (unreachable: missing scope: operator.read)' },
      { label: 'Gateway service', value: 'systemd not installed' },
      { label: 'Node service', value: 'systemd not installed' },
      { label: 'Agents', value: '3 · 1 bootstrap file present · sessions 24 · default main active 1h ago' },
      { label: 'Memory', value: '0 files · 0 chunks · dirty · sources memory · plugin memory-core · vector ready · fts ready · cache on (0)' },
      { label: 'Probes', value: 'skipped (use --deep)' },
      { label: 'Events', value: 'none' },
      { label: 'Heartbeat', value: '30m (main), disabled (agenta), disabled (worker)' },
      { label: 'Sessions', value: '24 active · default gemini-3.1-flash-lite-preview (200k ctx) · 3 stores' }
    ];

    const securityWarnings = [
      'Open groupPolicy with elevated tools enabled (channels discord/slack groupPolicy=open).',
      'Open groupPolicy with runtime/filesystem tools exposed (agents.defaults sandbox=off).',
      'Discord security warning: open groupPolicy allows any channel to trigger tools.',
      'Slack security warning: open groupPolicy + no channel allowlist.',
      'Reverse proxy headers not trusted (loopback bind + empty trustedProxies).',
      'gateway.nodes.denyCommands entries ineffective (needs exact command names).' 
    ];

    const channels = [
      {
        channel: 'Discord',
        state: 'ON · OK',
        detail: 'token config OK (accounts 1/1, bot len 72).'
      },
      {
        channel: 'Slack',
        state: 'ON · OK',
        detail: 'tokens ok (bot len 59, app len 98).'
      }
    ];

    const sessions = [
      { key: 'agent:agenta:main', kind: 'direct', age: '1m ago', model: 'gpt-5.1-codex-mini · 40k/128k (31%) · 7% cache' },
      { key: 'agent:main:main', kind: 'direct', age: '1h ago', model: 'gemini-2.5-flash · 16k/200k (8%)' },
      { key: 'agent:worker:slack:channel:c0alpesh', kind: 'group', age: '20h ago', model: 'gemini-flash-lite-latest · 17k/1049k (2%) · 12% cache' },
      { key: 'agent:main:slack:channel:c0alpech', kind: 'group', age: '3d ago', model: 'gemini-3.1-flash-lite-preview · 28k/1049k (3%) · 29% cache' },
      { key: 'agent:main:slack:channel:c0alpech', kind: 'group', age: '3d ago', model: 'gemini-3.1-flash-lite-preview · 29k/1049k (3%) · 28% cache' },
      { key: 'agent:main:slack:direct:u0akhsh', kind: 'direct', age: '4d ago', model: 'gemini-3.1-flash-lite-preview · 15k/1049k (1%)' },
      { key: 'agent:main:slack:channel:c0alpech', kind: 'group', age: '4d ago', model: 'gemini-3.1-flash-lite-preview · 31k/1049k (3%)' },
      { key: 'agent:agenta:discord:channel:14', kind: 'group', age: '4d ago', model: 'gpt-5-mini · 12k/128k (9%) · 97% cache' },
      { key: 'agent:main:slack:direct:u0akhsh', kind: 'direct', age: '6d ago', model: 'gemini-3.1-flash-lite-preview · 15k/1049k (1%)' },
      { key: 'agent:agenta:slack:channel:c0ak', kind: 'group', age: '6d ago', model: 'gpt-5-mini · 12k/128k (9%) · 95% cache' }
    ];

    const agents = [
      { name: 'main (default)', identity: '🦞 꽁군 (Kkonggun)', workspace: '~/.openclaw/workspace', model: 'google/gemini-3.1-flash-lite' },
      { name: 'worker', identity: '🌿 자공', workspace: '~/.openclaw/workspace-worker', model: 'google/gemini-flash-lite-latest' },
      { name: 'agenta (agentA)', identity: '⚡️ 에지', workspace: '~/.openclaw/workspace-agenta', model: 'openai-codex/gpt-5.1' }
    ];

    const statusGrid = document.getElementById('status-grid');
    statusSummary.forEach(({ label, value }) => {
      const card = document.createElement('article');
      card.className = 'status-card';
      card.innerHTML = `<strong>${label}</strong><span>${value}</span>`;
      statusGrid.appendChild(card);
    });

    const securityList = document.getElementById('security-list');
    securityWarnings.forEach((item) => {
      const li = document.createElement('li');
      li.textContent = item;
      securityList.appendChild(li);
    });

    const channelJson = document.getElementById('channel-json');
    channelJson.textContent = JSON.stringify(channels, null, 2);

    const sessionBody = document.getElementById('session-body');
    sessions.forEach((session) => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td data-label="세션">${session.key}</td>
        <td data-label="종류">${session.kind}</td>
        <td data-label="모델">${session.model}</td>
        <td data-label="활성화">${session.age}</td>
      `;
      sessionBody.appendChild(tr);
    });

    const agentBody = document.getElementById('agent-body');
    agents.forEach((agent) => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td data-label="에이전트">${agent.name}</td>
        <td data-label="Identity">${agent.identity}</td>
        <td data-label="Workspace">${agent.workspace}</td>
        <td data-label="모델">${agent.model}</td>
      `;
      agentBody.appendChild(tr);
    });
  </script>
</body>
</html>
