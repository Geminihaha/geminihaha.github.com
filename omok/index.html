<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Zenith Board - Omok Arena</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="style.css">
    
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-primary": "#432c07",
                        "surface-container-high": "#2d2926",
                        "background": "#121417",
                        "on-error": "#690005",
                        "on-tertiary": "#1b324a",
                        "surface-tint": "#e7c08f",
                        "secondary-fixed-dim": "#c5c6cc",
                        "on-tertiary-fixed": "#031d34",
                        "on-secondary-fixed": "#191c20",
                        "surface-container-lowest": "#100e0b",
                        "on-primary-fixed-variant": "#5c421b",
                        "on-tertiary-fixed-variant": "#334862",
                        "surface-container-low": "#1e1b18",
                        "surface-variant": "#383430",
                        "error": "#ffb4ab",
                        "tertiary": "#c6dcfc",
                        "on-background": "#e9e1db",
                        "tertiary-fixed": "#d2e4ff",
                        "inverse-primary": "#765930",
                        "on-error-container": "#ffdad6",
                        "tertiary-container": "#aac0df",
                        "on-surface-variant": "#d2c4b7",
                        "inverse-surface": "#e9e1db",
                        "tertiary-fixed-dim": "#b2c8e7",
                        "on-secondary": "#2e3035",
                        "on-surface": "#e9e1db",
                        "primary-fixed-dim": "#e7c08f",
                        "on-secondary-fixed-variant": "#45474c",
                        "secondary": "#c5c6cc",
                        "surface-container": "#221f1b",
                        "surface": "#161310",
                        "on-primary-fixed": "#291800",
                        "surface-dim": "#161310",
                        "secondary-fixed": "#e2e2e8",
                        "primary-container": "#deb887",
                        "on-primary-container": "#634821",
                        "surface-container-highest": "#383430",
                        "outline": "#9a8f82",
                        "on-secondary-container": "#b7b8be",
                        "primary": "#fcd4a1",
                        "inverse-on-surface": "#34302c",
                        "secondary-container": "#47494e",
                        "surface-bright": "#3d3834",
                        "error-container": "#93000a",
                        "on-tertiary-container": "#394e69",
                        "outline-variant": "#4e453b",
                        "primary-fixed": "#ffddb4"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.5rem",
                        "lg": "1.0rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Inter"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            }
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
        }
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-background text-on-surface font-body selection:bg-primary-container selection:text-on-primary-container min-h-screen flex flex-col">
    <!-- Custom Wood Texture Overlay -->
    <div class="fixed inset-0 stone-texture opacity-[0.03] pointer-events-none z-0"></div>

    <!-- Top Navigation Bar -->
    <header class="fixed top-0 w-full z-50 bg-[#121417]/80 backdrop-blur-xl shadow-2xl flex justify-between items-center px-6 py-4 border-b border-outline-variant/10">
        <div class="flex items-center gap-3">
            <span class="material-symbols-outlined text-primary-container cursor-pointer" data-icon="menu">menu</span>
        </div>
        <h1 class="font-headline text-xl tracking-wider uppercase text-primary drop-shadow-[0_2px_2px_rgba(0,0,0,0.8)] font-bold">Zenith Board</h1>
        <div class="flex items-center gap-3">
            <span class="material-symbols-outlined text-primary-container cursor-pointer" data-icon="settings">settings</span>
        </div>
    </header>
    <div class="fixed top-[64px] w-full bg-gradient-to-b from-[#8B5A2B]/20 to-transparent h-1 z-40"></div>

    <!-- Main Game Content -->
    <main class="flex-grow pt-24 pb-32 px-4 flex flex-col items-center max-w-lg mx-auto w-full relative z-10">
        <!-- Active Match Header and Turn Badge -->
        <section class="w-full flex justify-between items-center mb-4 px-2">
            <div class="flex flex-col">
                <span class="font-label text-[10px] text-on-surface-variant uppercase tracking-widest">Active Match</span>
                <span class="font-headline text-lg text-primary leading-tight font-bold">Zenith Arena</span>
            </div>
            <div id="turn-indicator" class="flex items-center gap-2.5 bg-surface-container px-4 py-2 rounded-full border border-outline-variant/30 font-label text-xs text-on-surface shadow-md transition-all duration-300">
                <span id="turn-stone" class="w-3.5 h-3.5 rounded-full shadow-inner inline-block transition-transform duration-300"></span>
                <span id="turn-text" class="font-bold tracking-wider">Black's Turn</span>
            </div>
        </section>

        <!-- Game Board Container -->
        <section class="w-full aspect-square bg-[#100e0b] rounded-xl p-3 shadow-2xl relative border border-outline-variant/10">
            <div id="board" class="board rounded overflow-hidden">
                <!-- JavaScript renders cells here -->
            </div>
        </section>

        <!-- Player Stat Tablets -->
        <section class="w-full mt-6 grid grid-cols-2 gap-4">
            <!-- Player One (Black) -->
            <div id="player-black" class="player-card black bg-surface-container-low p-4 rounded-xl border-l-4 border-[#1A1A1B] shadow-lg relative overflow-hidden transition-all duration-300">
                <div class="absolute top-0 right-0 p-2 opacity-10">
                    <span class="material-symbols-outlined text-4xl text-on-surface">circle</span>
                </div>
                <h3 class="font-label text-[10px] text-on-surface-variant tracking-[0.2em] uppercase mb-1">Black (First)</h3>
                <div class="flex items-baseline gap-2">
                    <span class="font-headline text-2xl text-on-surface font-semibold" id="score-black">Ink Stone</span>
                </div>
                <div class="mt-3 w-full bg-surface-container-lowest h-1 rounded-full overflow-hidden">
                    <div class="bg-[#1A1A1B] h-full w-[100%] transition-all duration-500"></div>
                </div>
            </div>

            <!-- Player Two (White) -->
            <div id="player-white" class="player-card white bg-surface-container-low p-4 rounded-xl border-r-4 border-[#F8F9FA] shadow-lg relative overflow-hidden transition-all duration-300">
                <div class="absolute top-0 left-0 p-2 opacity-10">
                    <span class="material-symbols-outlined text-4xl text-on-surface">circle</span>
                </div>
                <h3 class="font-label text-[10px] text-on-surface-variant tracking-[0.2em] uppercase mb-1 text-right">White (Second)</h3>
                <div class="flex items-baseline gap-2 justify-end">
                    <span class="font-headline text-2xl text-on-surface font-semibold" id="score-white">Shell Stone</span>
                </div>
                <div class="mt-3 w-full bg-surface-container-lowest h-1 rounded-full overflow-hidden">
                    <div class="bg-[#F8F9FA] h-full w-[100%] transition-all duration-500"></div>
                </div>
            </div>
        </section>

        <!-- Controls Panel -->
        <section class="w-full mt-6 flex flex-col gap-4">
            <!-- Battle Mode Selector (Segmented Control) -->
            <div class="flex flex-col gap-2 text-left">
                <label class="font-label text-[10px] text-on-surface-variant uppercase tracking-widest pl-1">Battle Mode</label>
                <div class="segmented-control">
                    <!-- Slide background indicator -->
                    <div id="segmented-indicator"></div>
                    
                    <button type="button" id="btn-mode-pvp" class="mode-btn">
                        PVP
                    </button>
                    <button type="button" id="btn-mode-pvb" class="mode-btn">
                        vs Guardian
                    </button>
                </div>
            </div>

            <!-- Reset Button -->
            <button id="reset-btn" class="w-full py-4 rounded-full font-label font-bold text-sm tracking-widest uppercase active:scale-95 transition-transform flex items-center justify-center gap-2">
                <span class="material-symbols-outlined text-lg">restart_alt</span>
                Reset Match
            </button>
        </section>
    </main>

    <!-- Bottom Navigation Bar -->
    <nav class="fixed bottom-0 w-full z-50 bg-[#121417]/95 backdrop-blur-2xl rounded-t-2xl border-t border-[#8B5A2B]/10 shadow-[0_-10px_30px_rgba(0,0,0,0.5)] flex justify-around items-center h-20 pb-safe px-4">
        <a class="flex flex-col items-center justify-center text-primary-container scale-110 drop-shadow-[0_0_8px_rgba(222,184,135,0.4)]" href="#">
            <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">grid_on</span>
            <span class="font-label text-[10px] uppercase tracking-widest mt-1">Board</span>
        </a>
        <a class="flex flex-col items-center justify-center text-slate-500 opacity-70 hover:opacity-100 transition-all" href="#">
            <span class="material-symbols-outlined">history</span>
            <span class="font-label text-[10px] uppercase tracking-widest mt-1">History</span>
        </a>
        <a class="flex flex-col items-center justify-center text-slate-500 opacity-70 hover:opacity-100 transition-all" href="#">
            <span class="material-symbols-outlined">menu_book</span>
            <span class="font-label text-[10px] uppercase tracking-widest mt-1">Rules</span>
        </a>
        <a class="flex flex-col items-center justify-center text-slate-500 opacity-70 hover:opacity-100 transition-all" href="#">
            <span class="material-symbols-outlined">settings</span>
            <span class="font-label text-[10px] uppercase tracking-widest mt-1">Settings</span>
        </a>
    </nav>

    <!-- Contextual Floating Help Button -->
    <div class="fixed bottom-24 right-6 z-40">
        <button class="w-14 h-14 rounded-full btn-standard flex items-center justify-center active:scale-95 transition-all">
            <span class="material-symbols-outlined">help</span>
        </button>
    </div>

    <!-- Victory/Defeat Modal -->
    <div id="victory-modal" class="modal-overlay fixed inset-0 flex justify-center items-center z-50 opacity-0 pointer-events-none transition-all duration-300">
        <div class="modal-content p-8 w-[90%] max-w-[360px] scale-95 transition-all duration-300 flex flex-col items-center text-center">
            <span id="modal-icon" class="material-symbols-outlined text-6xl mb-4 font-bold">workspace_premium</span>
            <h2 id="modal-title" class="font-headline text-2xl text-on-surface mb-2 font-bold">Victory!</h2>
            <p id="modal-body" class="font-body text-sm text-on-surface-variant mb-6">The Black Ink Stone has successfully aligned 5 stones.</p>
            <button id="modal-close-btn" class="w-full py-3 rounded-full bg-primary-container hover:bg-[#cfa775] text-[#432c07] font-label font-bold text-xs uppercase tracking-widest cursor-pointer transition-colors duration-200">Continue Match</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
