<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>The Epic Sovereign - Great Kingdom</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;700&amp;family=Manrope:wght@400;500;700&amp;family=Space_Grotesk:wght@500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Custom Stone Texture Overlay */
        .stone-texture {
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3F%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.03;
            pointer-events: none;
        }
        .glass-panel {
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "on-primary": "#522300",
                      "surface-container-high": "#282935",
                      "background": "#11131e",
                      "on-error": "#690005",
                      "on-tertiary": "#2c303a",
                      "surface-tint": "#ffb68a",
                      "secondary-fixed-dim": "#acc7ff",
                      "on-tertiary-fixed": "#171c25",
                      "on-secondary-fixed": "#001a40",
                      "surface-container-lowest": "#0c0d18",
                      "on-primary-fixed-variant": "#743500",
                      "on-tertiary-fixed-variant": "#424751",
                      "surface-container-low": "#1a1b26",
                      "surface-variant": "#333440",
                      "error": "#ffb4ab",
                      "tertiary": "#c2c6d3",
                      "on-background": "#e2e1f2",
                      "tertiary-fixed": "#dfe2ef",
                      "inverse-primary": "#984700",
                      "on-error-container": "#ffdad6",
                      "tertiary-container": "#8e929e",
                      "on-surface-variant": "#dcc1b3",
                      "inverse-surface": "#e2e1f2",
                      "tertiary-fixed-dim": "#c2c6d3",
                      "on-secondary": "#002f67",
                      "on-surface": "#e2e1f2",
                      "primary-fixed-dim": "#ffb68a",
                      "on-secondary-fixed-variant": "#004491",
                      "secondary": "#acc7ff",
                      "surface-container": "#1e1f2b",
                      "surface": "#11131e",
                      "on-primary-fixed": "#321300",
                      "surface-dim": "#11131e",
                      "secondary-fixed": "#d7e2ff",
                      "primary-container": "#dc7830",
                      "on-primary-container": "#4a1f00",
                      "surface-container-highest": "#333440",
                      "outline": "#a38c7f",
                      "on-secondary-container": "#a0bfff",
                      "primary": "#ffb68a",
                      "inverse-on-surface": "#2f2f3c",
                      "secondary-container": "#004b9e",
                      "surface-bright": "#373845",
                      "error-container": "#93000a",
                      "on-tertiary-container": "#272b35",
                      "outline-variant": "#554338",
                      "primary-fixed": "#ffdbc8"
              },
              "borderRadius": {
                      "DEFAULT": "0.125rem",
                      "lg": "0.25rem",
                      "xl": "0.5rem",
                      "full": "0.75rem"
              },
              "fontFamily": {
                      "headline": ["Noto Serif"],
                      "body": ["Manrope"],
                      "label": ["Space Grotesk"]
              }
            },
          }
        }
      </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body selection:bg-primary-container selection:text-on-primary-container min-h-screen flex flex-col">
<!-- Top Navigation Bar -->
<header class="fixed top-0 w-full z-50 bg-[#11131e]/80 backdrop-blur-xl shadow-2xl flex justify-between items-center w-full px-6 py-4">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-orange-400" data-icon="menu">menu</span>
</div>
<h1 class="font-['Noto_Serif'] text-xl tracking-wider uppercase text-orange-500 drop-shadow-[0_2px_2px_rgba(0,0,0,0.8)] font-bold">The Epic Sovereign</h1>
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-orange-400" data-icon="settings">settings</span>
</div>
</header>
<div class="fixed top-[64px] w-full bg-gradient-to-b from-orange-900/20 to-transparent h-1 z-40"></div>
<!-- Main Game Content -->
<main class="flex-grow pt-24 pb-32 px-4 flex flex-col items-center max-w-lg mx-auto w-full relative">
<div class="absolute inset-0 stone-texture"></div>
<!-- Game Board Container -->
<section class="w-full aspect-square bg-surface-container-lowest rounded-xl p-3 shadow-inner relative border border-outline-variant/10">
<!-- Board Header -->
<div class="flex justify-between items-center mb-4 px-2">
<div class="flex flex-col">
<span class="font-label text-[10px] text-tertiary uppercase tracking-widest">Active Realm</span>
<span class="font-headline text-lg text-primary-fixed leading-tight">Ironhold Basin</span>
</div>
<div class="bg-surface-container-high px-3 py-1 rounded-full border border-primary/20">
<span class="font-label text-xs text-primary">ROUND 12</span>
</div>
</div>
<!-- The Grid (Aurelian Stone Aesthetic) -->
<div class="grid grid-cols-8 grid-rows-8 gap-1 w-full aspect-square bg-surface-container rounded-lg overflow-hidden border-2 border-surface-container-high shadow-2xl">
<!-- Grid Cells Rendering -->
<!-- Simulated 8x8 Grid -->
<script>
                    for(let i=0; i<64; i++) {
                        let cellClass = "bg-surface-container-low hover:bg-surface-container-high transition-colors flex items-center justify-center relative";
                        let innerContent = "";
                        
                        // Adding some sample pieces
                        if(i === 27 || i === 36) {
                            innerContent = '<div class="w-4/5 h-4/5 rounded-full bg-secondary-container shadow-[inset_0_2px_4px_rgba(0,0,0,0.5)] border border-secondary/30"></div>';
                        }
                        if(i === 28 || i === 35) {
                            innerContent = '<div class="w-4/5 h-4/5 rounded-full bg-primary-container shadow-[inset_0_2px_4px_rgba(0,0,0,0.5)] border border-primary/30"></div>';
                        }

                        document.write(`<div class="${cellClass}">${innerContent}<div class="absolute inset-0 border-[0.5px] border-outline-variant/5"></div></div>`);
                    }
                </script>
</div>
</section>
<!-- Player Stat Tablets -->
<section class="w-full mt-6 grid grid-cols-2 gap-4">
<!-- Player One (Blue) -->
<div class="bg-surface-container-low p-4 rounded-xl border-l-4 border-secondary shadow-lg relative overflow-hidden">
<div class="absolute top-0 right-0 p-2 opacity-10">
<span class="material-symbols-outlined text-4xl" data-icon="shield">shield</span>
</div>
<h3 class="font-label text-[10px] text-secondary tracking-[0.2em] uppercase mb-1">Blue (First)</h3>
<div class="flex items-baseline gap-2">
<span class="font-headline text-4xl text-on-surface">2</span>
<span class="font-label text-xs text-tertiary/60">Points</span>
</div>
<div class="mt-3 w-full bg-surface-container-lowest h-1 rounded-full overflow-hidden">
<div class="bg-secondary h-full w-[20%]"></div>
</div>
</div>
<!-- Player Two (Orange) -->
<div class="bg-surface-container-low p-4 rounded-xl border-r-4 border-primary shadow-lg relative overflow-hidden ring-2 ring-primary/20">
<div class="absolute top-0 left-0 p-2 opacity-10">
<span class="material-symbols-outlined text-4xl" data-icon="swords">swords</span>
</div>
<h3 class="font-label text-[10px] text-primary tracking-[0.2em] uppercase mb-1 text-right">Orange (Second)</h3>
<div class="flex items-baseline gap-2 justify-end">
<span class="font-label text-xs text-tertiary/60">Points</span>
<span class="font-headline text-4xl text-on-surface">2</span>
</div>
<div class="mt-3 w-full bg-surface-container-lowest h-1 rounded-full overflow-hidden">
<div class="bg-primary h-full w-[20%] ml-auto"></div>
</div>
</div>
</section>
<!-- Action Controls -->
<section class="w-full mt-8 flex flex-col gap-3">
<button class="w-full py-4 rounded-xl bg-gradient-to-r from-primary-container to-inverse-primary text-on-primary-container font-label font-bold text-sm tracking-widest uppercase shadow-[0_4px_15px_rgba(220,120,48,0.3)] active:scale-95 transition-transform flex items-center justify-center gap-2 border-t border-primary/30">
<span class="material-symbols-outlined text-lg" data-icon="timer">timer</span>
                Pass Turn
            </button>
<button class="w-full py-3 rounded-xl bg-surface-container-high text-tertiary font-label text-xs tracking-widest uppercase border border-outline-variant/20 hover:bg-surface-bright transition-colors active:scale-95 flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-sm" data-icon="grid_view">grid_view</span>
                Main Menu
            </button>
</section>
</main>
<!-- Bottom Navigation Bar -->
<nav class="fixed bottom-0 w-full z-50 bg-[#11131e]/90 backdrop-blur-2xl rounded-t-2xl border-t border-orange-500/10 shadow-[0_-10px_30px_rgba(0,0,0,0.5)] flex justify-around items-center w-full h-20 pb-safe px-4">
<a class="flex flex-col items-center justify-center text-orange-400 scale-110 drop-shadow-[0_0_8px_rgba(220,120,48,0.4)]" href="#">
<span class="material-symbols-outlined" data-icon="fort" style="font-variation-settings: 'FILL' 1;">fort</span>
<span class="font-['Space_Grotesk'] text-[10px] uppercase tracking-widest mt-1">Kingdom</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-500 opacity-70 hover:opacity-100 transition-all" href="#">
<span class="material-symbols-outlined" data-icon="swords">swords</span>
<span class="font-['Space_Grotesk'] text-[10px] uppercase tracking-widest mt-1">Legion</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-500 opacity-70 hover:opacity-100 transition-all" href="#">
<span class="material-symbols-outlined" data-icon="database">database</span>
<span class="font-['Space_Grotesk'] text-[10px] uppercase tracking-widest mt-1">Treasury</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-500 opacity-70 hover:opacity-100 transition-all" href="#">
<span class="material-symbols-outlined" data-icon="book_5">book_5</span>
<span class="font-['Space_Grotesk'] text-[10px] uppercase tracking-widest mt-1">Lore</span>
</a>
</nav>
<!-- Contextual Floating Effect -->
<div class="fixed bottom-24 right-6 z-40">
<button class="w-14 h-14 rounded-full bg-primary-container text-on-primary-container shadow-2xl flex items-center justify-center border border-primary/50 ring-4 ring-primary/10 active:scale-90 transition-all">
<span class="material-symbols-outlined" data-icon="help">help</span>
</button>
</div>
</body></html>
